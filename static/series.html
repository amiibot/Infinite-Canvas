<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" href="/static/logo.png" type="image/png">
    <title>系列详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/theme.js?v=20260509-global-theme-output-drag"></script>
    <script src="/static/i18n.js?v=20260512-pages"></script>
    <link rel="stylesheet" href="/static/theme.css?v=20260510-studio-pages-blue-dark10">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { box-sizing: border-box; }
        :root {
            --bg: #ffffff;
            --stage-bg: #f7f8fa;
            --stage-border: #e8eaed;
            --border: #ebebeb;
            --text: #121212;
            --muted: #999;
        }
        body.theme-dark {
            --bg: #171d29;
            --stage-bg: #0f141d;
            --stage-border: #2a3444;
            --border: #242d3b;
            --text: #e5e9f0;
            --muted: #8f9aab;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(59,130,246,.08), transparent 32%),
                radial-gradient(circle at top right, rgba(16,185,129,.06), transparent 28%),
                var(--stage-bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .page { max-width: 1280px; margin: 0 auto; padding: 40px 32px 48px; }
        .topbar { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
        .back-btn {
            width: 40px; height: 40px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg);
            color: var(--text); font-size: 18px; font-weight: 700;
            cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
            transition: transform .18s, box-shadow .18s;
            flex-shrink: 0;
        }
        .back-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(15,23,42,.08); }
        .title-area { flex: 1; min-width: 0; }
        .series-title {
            margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -.03em;
            outline: none; border-radius: 8px; padding: 2px 6px; margin-left: -6px;
        }
        .series-title[contenteditable="true"] {
            background: var(--stage-bg); border: 1px solid var(--border);
        }
        .series-desc { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
        .stats-row { display: flex; gap: 20px; margin-bottom: 32px; flex-wrap: wrap; }
        .stat-chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 999px;
            background: var(--bg); border: 1px solid var(--border);
            font-size: 13px; font-weight: 600; color: var(--text);
        }
        .stat-chip span { color: var(--muted); font-weight: 400; }
        .action-btn {
            height: 42px; padding: 0 18px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg);
            color: var(--text); font-size: 14px; font-weight: 700;
            cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
            transition: transform .18s, box-shadow .18s, border-color .18s;
        }
        .action-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(15,23,42,.08); border-color: var(--stage-border); }
        .action-btn.primary { background: #3b82f6; color: #fff; border-color: #3b82f6; }
        .action-btn.primary:hover { background: #2563eb; border-color: #2563eb; }
        .layout { display: grid; grid-template-columns: 1fr 320px; gap: 28px; align-items: start; }
        .section-title { font-size: 15px; font-weight: 700; margin: 0 0 16px; }
        .episode-card {
            position: relative; background: var(--bg); border: 1px solid var(--border);
            border-radius: 14px; padding: 18px 20px; cursor: pointer;
            transition: transform .2s, box-shadow .2s, border-color .2s;
            display: flex; align-items: center; gap: 16px; margin-bottom: 12px;
        }
        .episode-card:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(15,23,42,.08); border-color: var(--stage-border); }
        .ep-num {
            width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
            background: rgba(59,130,246,.1); color: #2563eb;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 800;
        }
        .ep-body { flex: 1; min-width: 0; }
        .ep-title { font-size: 15px; font-weight: 700; margin: 0 0 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ep-meta { font-size: 12px; color: var(--muted); }
        .status-badge {
            display: inline-flex; align-items: center; height: 24px; padding: 0 10px;
            border-radius: 999px; font-size: 11px; font-weight: 700;
        }
        .status-pending { color: #b45309; background: rgba(245,158,11,.12); }
        .status-processing { color: #2563eb; background: rgba(59,130,246,.12); }
        .status-completed { color: #047857; background: rgba(16,185,129,.14); }
        .delete-btn {
            position: absolute; top: 12px; right: 12px;
            width: 30px; height: 30px; border-radius: 999px;
            border: 1px solid transparent; background: rgba(255,255,255,.9);
            color: #ef4444; display: inline-flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; pointer-events: none;
            transition: opacity .18s, transform .18s;
        }
        body.theme-dark .delete-btn { background: rgba(15,20,29,.9); border-color: var(--border); }
        .episode-card:hover .delete-btn { opacity: 1; pointer-events: auto; }
        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--muted);
        }
        .empty-state h3 { font-size: 18px; font-weight: 700; color: var(--text); margin: 0 0 8px; }
        .asset-panel { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
        .asset-section { margin-bottom: 20px; }
        .asset-section-head {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .asset-section-title { font-size: 13px; font-weight: 700; }
        .mini-btn {
            font-size: 12px; padding: 4px 10px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--bg);
            color: var(--text); cursor: pointer;
        }
        .mini-btn:hover { background: var(--stage-bg); }
        .asset-chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 10px; border-radius: 8px; margin: 3px;
            background: var(--stage-bg); border: 1px solid var(--border);
            font-size: 12px; font-weight: 600;
        }
        .asset-chip img { width: 20px; height: 20px; border-radius: 4px; object-fit: cover; }
        .asset-chip button { background: none; border: none; color: var(--muted); cursor: pointer; padding: 0; font-size: 14px; line-height: 1; }
        .asset-chip button:hover { color: #ef4444; }
        .inline-form { display: none; margin-top: 10px; }
        .inline-form.show { display: block; }
        .field {
            width: 100%; padding: 8px 12px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--stage-bg);
            color: var(--text); font-size: 13px; margin-bottom: 8px;
        }
        .field:focus { outline: none; border-color: #3b82f6; }
        .form-row { display: flex; gap: 8px; }
        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.45); z-index: 100;
            align-items: center; justify-content: center;
        }
        .overlay.open { display: flex; }
        .modal {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 20px; padding: 28px; width: 400px; max-width: 90vw;
        }
        .modal h3 { margin: 0 0 20px; font-size: 18px; font-weight: 800; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    </style>
</head>
<body>
<div class="page">
    <div class="topbar">
        <button class="back-btn" id="backBtn" title="返回工作区">←</button>
        <div class="title-area">
            <h1 class="series-title" id="seriesTitle">加载中…</h1>
            <p class="series-desc" id="seriesDesc"></p>
        </div>
        <button class="action-btn primary" id="newEpisodeBtn">+ 新建剧集</button>
    </div>
    <div class="stats-row" id="statsRow"></div>
    <div class="layout">
        <div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
                <div class="section-title" data-zh="剧集列表" data-en="Episodes">剧集列表</div>
            </div>
            <div id="episodeList"></div>
        </div>
        <div>
            <div class="asset-panel">
                <div class="section-title" data-zh="系列资产" data-en="Series Assets">系列资产</div>
                <div class="asset-section">
                    <div class="asset-section-head">
                        <span class="asset-section-title" data-zh="角色" data-en="Characters">角色</span>
                        <button class="mini-btn" id="addCharBtn">+ 添加</button>
                    </div>
                    <div id="charList"></div>
                    <div class="inline-form" id="charForm">
                        <input class="field" id="charNameInput" placeholder="角色名称" aria-label="角色名称" />
                        <div class="form-row">
                            <button class="action-btn" id="saveCharBtn" style="height:34px;font-size:13px;">保存</button>
                            <button class="action-btn" id="cancelCharBtn" style="height:34px;font-size:13px;">取消</button>
                        </div>
                    </div>
                </div>
                <div class="asset-section">
                    <div class="asset-section-head">
                        <span class="asset-section-title" data-zh="场景" data-en="Scenes">场景</span>
                        <button class="mini-btn" id="addSceneBtn">+ 添加</button>
                    </div>
                    <div id="sceneList"></div>
                    <div class="inline-form" id="sceneForm">
                        <input class="field" id="sceneNameInput" placeholder="场景名称" aria-label="场景名称" />
                        <div class="form-row">
                            <button class="action-btn" id="saveSceneBtn" style="height:34px;font-size:13px;">保存</button>
                            <button class="action-btn" id="cancelSceneBtn" style="height:34px;font-size:13px;">取消</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="newEpisodeOverlay">
    <div class="modal">
        <h3 data-zh="新建剧集" data-en="New Episode">新建剧集</h3>
        <input class="field" id="epTitleInput" placeholder="剧集标题" aria-label="集标题" />
        <input class="field" id="epNumInput" type="number" placeholder="集数（可选）" aria-label="集数" min="1" />
        <div class="modal-actions">
            <button class="action-btn" id="cancelEpBtn">取消</button>
            <button class="action-btn primary" id="createEpBtn">创建</button>
        </div>
    </div>
</div>

<script>
    const seriesId = new URLSearchParams(location.search).get('id');
    let state = { lang: 'zh', series: null, episodes: [] };

    function esc(v) {
        return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function tr(zh, en) { return state.lang === 'en' ? (en || zh) : zh; }

    async function api(path, opts = {}) {
        const res = await fetch(path, { headers: { 'Content-Type': 'application/json', ...(opts.headers||{}) }, ...opts });
        if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.detail || `HTTP ${res.status}`); }
        return res.json();
    }

    async function load() {
        if (!seriesId) { document.getElementById('seriesTitle').textContent = '缺少系列 ID'; return; }
        try {
            const [series, episodes] = await Promise.all([
                api(`/api/comic/series/${seriesId}`),
                api(`/api/comic/series/${seriesId}/episodes`)
            ]);
            state.series = series;
            state.episodes = episodes;
            render();
        } catch (e) {
            document.getElementById('seriesTitle').textContent = e.message;
        }
    }

    function render() {
        const s = state.series;
        if (!s) return;
        document.getElementById('seriesTitle').textContent = s.title || '';
        document.getElementById('seriesDesc').textContent = s.description || '';
        const epCount = state.episodes.length;
        const charCount = (s.characters || []).length;
        const sceneCount = (s.scenes || []).length;
        document.getElementById('statsRow').innerHTML = `
            <div class="stat-chip"><b>${epCount}</b> <span>${tr('集', 'Episodes')}</span></div>
            <div class="stat-chip"><b>${charCount}</b> <span>${tr('角色', 'Characters')}</span></div>
            <div class="stat-chip"><b>${sceneCount}</b> <span>${tr('场景', 'Scenes')}</span></div>
        `;
        renderEpisodes();
        renderAssets();
    }

    function renderEpisodes() {
        const list = document.getElementById('episodeList');
        if (!state.episodes.length) {
            list.innerHTML = `<div class="empty-state"><h3>${tr('还没有剧集','No Episodes')}</h3><p>${tr('点击"新建剧集"开始创作。','Click "New Episode" to start.')}</p></div>`;
            return;
        }
        list.innerHTML = state.episodes.map(ep => {
            const statusClass = `status-${ep.status || 'pending'}`;
            const statusText = ep.status === 'completed' ? tr('已完成','Completed') : ep.status === 'processing' ? tr('处理中','Processing') : tr('待处理','Pending');
            const charCount = (ep.characters||[]).length;
            const sceneCount = (ep.scenes||[]).length;
            const frameCount = (ep.frames||[]).length;
            const date = ep.created_at ? new Date(ep.created_at * 1000).toLocaleDateString('zh-CN') : '';
            return `<div class="episode-card" data-ep-id="${esc(ep.id)}">
                <button class="delete-btn" data-del-ep="${esc(ep.id)}" title="${tr('删除','Delete')}">×</button>
                <div class="ep-num">${ep.episode_number || '?'}</div>
                <div class="ep-body">
                    <div class="ep-title">${esc(ep.title)}</div>
                    <div class="ep-meta">${charCount}${tr('角色','chars')} · ${sceneCount}${tr('场景','scenes')} · ${frameCount}${tr('分镜','frames')} · ${date}</div>
                </div>
                <span class="status-badge ${statusClass}">${statusText}</span>
            </div>`;
        }).join('');
    }

    function renderAssets() {
        const s = state.series;
        const chars = s.characters || [];
        const scenes = s.scenes || [];
        document.getElementById('charList').innerHTML = chars.length
            ? chars.map(c => `<span class="asset-chip">${c.image_url ? `<img src="${esc(c.image_url)}" alt="" loading="lazy">` : ''}<span>${esc(c.name)}</span><button data-del-char="${esc(c.id)}">×</button></span>`).join('')
            : `<span style="font-size:12px;color:var(--muted)">${tr('暂无角色','No characters')}</span>`;
        document.getElementById('sceneList').innerHTML = scenes.length
            ? scenes.map(sc => `<span class="asset-chip">${sc.image_url ? `<img src="${esc(sc.image_url)}" alt="" loading="lazy">` : ''}<span>${esc(sc.name)}</span><button data-del-scene="${esc(sc.id)}">×</button></span>`).join('')
            : `<span style="font-size:12px;color:var(--muted)">${tr('暂无场景','No scenes')}</span>`;
    }

    document.getElementById('backBtn').addEventListener('click', () => {
        window.parent.postMessage({ type: 'navigate', page: 'workspace' }, location.origin);
    });

    document.getElementById('episodeList').addEventListener('click', async e => {
        const delBtn = e.target.closest('[data-del-ep]');
        if (delBtn) {
            e.stopPropagation();
            if (!confirm(tr('确认删除此剧集？','Delete this episode?'))) return;
            try {
                await api(`/api/comic/projects/${delBtn.dataset.delEp}`, { method: 'DELETE' });
                state.episodes = state.episodes.filter(ep => ep.id !== delBtn.dataset.delEp);
                render();
            } catch (err) { alert(err.message); }
            return;
        }
        const card = e.target.closest('[data-ep-id]');
        if (card) {
            window.parent.postMessage({ type: 'navigate', page: 'project', id: card.dataset.epId }, location.origin);
        }
    });

    document.getElementById('newEpisodeBtn').addEventListener('click', () => {
        document.getElementById('epTitleInput').value = '';
        document.getElementById('epNumInput').value = '';
        document.getElementById('newEpisodeOverlay').classList.add('open');
        document.getElementById('epTitleInput').focus();
    });
    document.getElementById('cancelEpBtn').addEventListener('click', () => {
        document.getElementById('newEpisodeOverlay').classList.remove('open');
    });
    document.getElementById('newEpisodeOverlay').addEventListener('click', e => {
        if (e.target === document.getElementById('newEpisodeOverlay'))
            document.getElementById('newEpisodeOverlay').classList.remove('open');
    });
    document.getElementById('createEpBtn').addEventListener('click', async () => {
        const title = document.getElementById('epTitleInput').value.trim();
        if (!title) { document.getElementById('epTitleInput').focus(); return; }
        const epNum = parseInt(document.getElementById('epNumInput').value) || null;
        try {
            const ep = await api('/api/comic/projects', { method: 'POST', body: JSON.stringify({ title, series_id: seriesId, episode_number: epNum }) });
            state.episodes.push(ep);
            document.getElementById('newEpisodeOverlay').classList.remove('open');
            render();
        } catch (err) { alert(err.message); }
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') document.getElementById('newEpisodeOverlay').classList.remove('open');
    });

    document.getElementById('addCharBtn').addEventListener('click', () => {
        document.getElementById('charForm').classList.toggle('show');
        document.getElementById('charNameInput').focus();
    });
    document.getElementById('cancelCharBtn').addEventListener('click', () => {
        document.getElementById('charForm').classList.remove('show');
    });
    document.getElementById('saveCharBtn').addEventListener('click', async () => {
        const name = document.getElementById('charNameInput').value.trim();
        if (!name) return;
        try {
            const char = await api(`/api/comic/series/${seriesId}/characters`, { method: 'POST', body: JSON.stringify({ name }) });
            state.series.characters = [...(state.series.characters || []), char];
            document.getElementById('charForm').classList.remove('show');
            document.getElementById('charNameInput').value = '';
            render();
        } catch (err) { alert(err.message); }
    });

    document.getElementById('addSceneBtn').addEventListener('click', () => {
        document.getElementById('sceneForm').classList.toggle('show');
        document.getElementById('sceneNameInput').focus();
    });
    document.getElementById('cancelSceneBtn').addEventListener('click', () => {
        document.getElementById('sceneForm').classList.remove('show');
    });
    document.getElementById('saveSceneBtn').addEventListener('click', async () => {
        const name = document.getElementById('sceneNameInput').value.trim();
        if (!name) return;
        try {
            const scene = await api(`/api/comic/series/${seriesId}/scenes`, { method: 'POST', body: JSON.stringify({ name }) });
            state.series.scenes = [...(state.series.scenes || []), scene];
            document.getElementById('sceneForm').classList.remove('show');
            document.getElementById('sceneNameInput').value = '';
            render();
        } catch (err) { alert(err.message); }
    });

    document.getElementById('charList').addEventListener('click', async e => {
        const btn = e.target.closest('[data-del-char]');
        if (!btn) return;
        if (!confirm(tr('删除此角色？','Delete character?'))) return;
        try {
            await api(`/api/comic/series/${seriesId}/characters/${btn.dataset.delChar}`, { method: 'DELETE' });
            state.series.characters = state.series.characters.filter(c => c.id !== btn.dataset.delChar);
            render();
        } catch (err) { alert(err.message); }
    });
    document.getElementById('sceneList').addEventListener('click', async e => {
        const btn = e.target.closest('[data-del-scene]');
        if (!btn) return;
        if (!confirm(tr('删除此场景？','Delete scene?'))) return;
        try {
            await api(`/api/comic/series/${seriesId}/scenes/${btn.dataset.delScene}`, { method: 'DELETE' });
            state.series.scenes = state.series.scenes.filter(sc => sc.id !== btn.dataset.delScene);
            render();
        } catch (err) { alert(err.message); }
    });

    const titleEl = document.getElementById('seriesTitle');
    titleEl.addEventListener('click', () => {
        titleEl.contentEditable = 'true';
        titleEl.focus();
        const range = document.createRange();
        range.selectNodeContents(titleEl);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
    });
    titleEl.addEventListener('blur', async () => {
        titleEl.contentEditable = 'false';
        const newTitle = titleEl.textContent.trim();
        if (!newTitle || !state.series || newTitle === state.series.title) return;
        try {
            const updated = await api(`/api/comic/series/${seriesId}`, { method: 'PUT', body: JSON.stringify({ title: newTitle }) });
            state.series = updated;
        } catch (err) { titleEl.textContent = state.series.title; }
    });
    titleEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); } });

    window.addEventListener('message', e => {
        if (e.origin !== location.origin) return;
        if (e.data?.type === 'studio-theme') document.body.classList.toggle('theme-dark', e.data.theme === 'dark');
        if (e.data?.type === 'studio-lang') {
            state.lang = e.data.lang || 'zh';
            document.querySelectorAll('[data-zh]').forEach(el => {
                el.textContent = state.lang === 'en' ? (el.dataset.en || el.dataset.zh) : el.dataset.zh;
            });
        }
    });

    load();
</script>
</body>
</html>
