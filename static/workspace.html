<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/logo.png" type="image/png">
    <title>我的工作区</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/theme.js?v=20260509-global-theme-output-drag"></script>
    <script src="/static/i18n.js?v=20260512-pages"></script>
    <link rel="stylesheet" href="/static/theme.css?v=20260510-studio-pages-blue-dark10">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { box-sizing: border-box; }
        :root {
            --bg: #ffffff;
            --stage-bg: #f7f8fa;
            --stage-border: #e8eaed;
            --border: #ebebeb;
            --text: #121212;
            --muted: #999;
        }
        body.theme-dark {
            --bg: #171d29;
            --stage-bg: #0f141d;
            --stage-border: #2a3444;
            --border: #242d3b;
            --text: #e5e9f0;
            --muted: #8f9aab;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(59,130,246,.08), transparent 32%),
                radial-gradient(circle at top right, rgba(16,185,129,.06), transparent 28%),
                var(--stage-bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 40px 32px 48px;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
        }
        .title-wrap h1 {
            margin: 0;
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -.04em;
        }
        .title-wrap p {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .18em;
            text-transform: uppercase;
        }
        .count-badge {
            display: inline-flex;
            align-items: center;
            min-width: 32px;
            height: 32px;
            padding: 0 12px;
            border-radius: 999px;
            background: var(--bg);
            border: 1px solid var(--border);
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }
        .actions {
            position: relative;
        }
        .action-button {
            height: 46px;
            padding: 0 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
        }
        .action-button:hover,
        .action-button[aria-expanded="true"] {
            transform: translateY(-1px);
            box-shadow: 0 12px 28px rgba(15, 23, 42, .08);
            border-color: var(--stage-border);
        }
        .dropdown {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            width: 180px;
            padding: 8px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: var(--bg);
            box-shadow: 0 20px 60px rgba(15, 23, 42, .12);
            display: none;
            z-index: 40;
        }
        .dropdown.open { display: block; }
        .dropdown button {
            width: 100%;
            height: 42px;
            border: 0;
            background: transparent;
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            border-radius: 12px;
            text-align: left;
            padding: 0 12px;
            cursor: pointer;
        }
        .dropdown button:hover { background: var(--stage-bg); }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 20px;
        }
        .card {
            position: relative;
            min-height: 210px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 40px rgba(15, 23, 42, .10);
            border-color: var(--stage-border);
        }
        .series-card {
            grid-column: span 2;
            border-left: 3px solid #3b82f6;
        }
        .card-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }
        .tag,
        .status-badge {
            display: inline-flex;
            align-items: center;
            height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }
        .tag {
            background: rgba(59, 130, 246, .10);
            color: #2563eb;
        }
        .status-badge {
            background: var(--stage-bg);
            color: var(--muted);
        }
        .status-pending { color: #b45309; background: rgba(245, 158, 11, .12); }
        .status-processing { color: #2563eb; background: rgba(59, 130, 246, .12); }
        .status-completed { color: #047857; background: rgba(16, 185, 129, .14); }
        .delete-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 34px;
            height: 34px;
            border-radius: 999px;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, .92);
            color: #ef4444;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transform: translateY(-4px);
            pointer-events: none;
            transition: opacity .18s ease, transform .18s ease, border-color .18s ease;
        }
        .card:hover .delete-btn {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        body.theme-dark .delete-btn {
            background: rgba(15, 20, 29, .94);
            border-color: var(--border);
        }
        .card-title {
            margin: 0;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -.03em;
            line-height: 1.15;
            padding-right: 28px;
        }
        .series-desc {
            margin: 12px 0 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-foot {
            margin-top: auto;
            padding-top: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .meta {
            color: var(--muted);
            font-size: 13px;
            font-weight: 600;
        }
        .date {
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        .empty {
            min-height: calc(100vh - 180px);
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .empty.show { display: flex; }
        .empty-card {
            width: min(520px, 100%);
            padding: 46px 28px;
            border-radius: 28px;
            border: 1px dashed var(--stage-border);
            background: rgba(255, 255, 255, .42);
            backdrop-filter: blur(10px);
        }
        body.theme-dark .empty-card {
            background: rgba(17, 23, 34, .62);
        }
        .empty-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .empty h2 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -.03em;
        }
        .empty p {
            margin: 12px 0 0;
            color: var(--muted);
            font-size: 14px;
        }
        .empty-actions {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 28px;
            flex-wrap: wrap;
        }
        .big-btn {
            min-width: 160px;
            height: 52px;
            padding: 0 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        .big-btn.primary {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }
        .modal-layer {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, .28);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 80;
        }
        .modal-layer.show { display: flex; }
        .modal {
            width: min(480px, 100%);
            border-radius: 24px;
            border: 1px solid var(--border);
            background: var(--bg);
            box-shadow: 0 30px 80px rgba(15, 23, 42, .18);
            padding: 24px;
        }
        .modal h3 {
            margin: 0 0 18px;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -.03em;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }
        .field label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }
        .field input,
        .field textarea {
            width: 100%;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--stage-bg);
            color: var(--text);
            padding: 14px 16px;
            font: inherit;
            outline: none;
        }
        .field input:focus,
        .field textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, .12);
        }
        .field textarea {
            min-height: 110px;
            resize: vertical;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 22px;
        }
        .modal-actions button {
            height: 44px;
            padding: 0 18px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .modal-actions .primary {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }
        .tab-bar {
            display: flex;
            gap: 0;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            padding: 10px 22px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color .15s;
        }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { color: var(--text); border-bottom-color: var(--accent, #3b82f6); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .library-frame {
            width: 100%;
            height: calc(100vh - 140px);
            border: none;
            border-radius: 12px;
        }
        @media (max-width: 1024px) {
            .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width: 768px) {
            .page { padding: 28px 18px 36px; }
            .topbar { flex-direction: column; align-items: stretch; }
            .grid { grid-template-columns: 1fr; }
            .series-card { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="tab-bar" id="mainTabBar" role="tablist">
            <button class="tab-btn active" id="tab-workspace" data-tab="workspace" role="tab" aria-selected="true" aria-controls="panel-workspace" tabindex="0" data-zh="我的工作区" data-en="My Workspace">我的工作区</button>
            <button class="tab-btn" id="tab-library" data-tab="library" role="tab" aria-selected="false" aria-controls="panel-library" tabindex="-1" data-zh="资产库" data-en="Asset Library">资产库</button>
        </div>

        <div class="tab-panel active" id="panel-workspace" role="tabpanel" aria-labelledby="tab-workspace">
        <header class="topbar">
            <div class="title-wrap">
                <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                    <h1 data-zh="我的工作区" data-en="My Workspace">我的工作区</h1>
                    <span class="count-badge" id="itemCount">0</span>
                </div>
                <p>INFINITE CANVAS WORKSPACE</p>
            </div>
            <div class="actions">
                <button class="action-button" id="newButton" type="button" aria-expanded="false">
                    <span data-zh="新建" data-en="New">新建</span>
                    <span>▾</span>
                </button>
                <div class="dropdown" id="newDropdown">
                    <button type="button" id="createSeriesAction" data-zh="新建系列" data-en="New Series">新建系列</button>
                    <button type="button" id="createProjectAction" data-zh="新建项目" data-en="New Project">新建项目</button>
                </div>
            </div>
        </header>

        <section id="grid" class="grid"></section>

        <section id="emptyState" class="empty">
            <div class="empty-card">
                <div class="empty-icon">🗂</div>
                <h2 data-zh="还没有项目" data-en="No items yet">还没有项目</h2>
                <p data-zh="从系列或项目开始，逐步搭建你的漫画工作区。" data-en="Start with a series or a project to build your comic workspace.">从系列或项目开始，逐步搭建你的漫画工作区。</p>
                <div class="empty-actions">
                    <button class="big-btn" type="button" id="emptySeriesBtn" data-zh="新建系列" data-en="New Series">新建系列</button>
                    <button class="big-btn primary" type="button" id="emptyProjectBtn" data-zh="新建项目" data-en="New Project">新建项目</button>
                </div>
            </div>
        </section>
        </div><!-- /panel-workspace -->

        <div class="tab-panel" id="panel-library" role="tabpanel" aria-labelledby="tab-library">
            <iframe class="library-frame" src="/static/library.html" id="libraryFrame" onload="syncLibraryFrame()"></iframe>
        </div>
    </div>

    <div class="modal-layer" id="seriesModal">
        <div class="modal" role="dialog" aria-modal="true">
            <h3 data-zh="新建系列" data-en="New Series">新建系列</h3>
            <form id="seriesForm">
                <div class="field">
                    <label for="seriesTitle" data-zh="系列标题" data-en="Series Title">系列标题</label>
                    <input id="seriesTitle" name="title" required data-placeholder-zh="输入系列标题" data-placeholder-en="Enter series title">
                </div>
                <div class="field">
                    <label for="seriesDescription" data-zh="系列描述" data-en="Description">系列描述</label>
                    <textarea id="seriesDescription" name="description" data-placeholder-zh="输入系列描述" data-placeholder-en="Enter a short description"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" data-close="seriesModal" data-zh="取消" data-en="Cancel">取消</button>
                    <button type="submit" class="primary" data-zh="创建" data-en="Create">创建</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-layer" id="projectModal">
        <div class="modal" role="dialog" aria-modal="true">
            <h3 data-zh="新建项目" data-en="New Project">新建项目</h3>
            <form id="projectForm">
                <div class="field">
                    <label for="projectTitle" data-zh="项目标题" data-en="Project Title">项目标题</label>
                    <input id="projectTitle" name="title" required data-placeholder-zh="输入项目标题" data-placeholder-en="Enter project title">
                </div>
                <div class="modal-actions">
                    <button type="button" data-close="projectModal" data-zh="取消" data-en="Cancel">取消</button>
                    <button type="submit" class="primary" data-zh="创建" data-en="Create">创建</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Tab switching
        const tabBar = document.getElementById('mainTabBar');
        const tabBtns = tabBar.querySelectorAll('.tab-btn');
        function activateTab(btn) {
            const tab = btn.dataset.tab;
            tabBtns.forEach(b => {
                b.classList.remove('active');
                b.setAttribute('aria-selected', 'false');
                b.setAttribute('tabindex', '-1');
            });
            btn.classList.add('active');
            btn.setAttribute('aria-selected', 'true');
            btn.setAttribute('tabindex', '0');
            btn.focus();
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + tab).classList.add('active');
            if (tab === 'library') {
                syncLibraryFrame();
            }
        }
        tabBar.addEventListener('click', (e) => {
            const btn = e.target.closest('.tab-btn');
            if (!btn) return;
            activateTab(btn);
        });
        tabBar.addEventListener('keydown', (e) => {
            const tabs = [...tabBtns];
            const idx = tabs.indexOf(document.activeElement);
            if (idx < 0) return;
            let next = -1;
            if (e.key === 'ArrowRight') next = (idx + 1) % tabs.length;
            else if (e.key === 'ArrowLeft') next = (idx - 1 + tabs.length) % tabs.length;
            if (next >= 0) { e.preventDefault(); activateTab(tabs[next]); }
        });

        function syncLibraryFrame() {
            const frame = document.getElementById('libraryFrame');
            if (!frame || !frame.contentWindow) return;
            const theme = document.body.classList.contains('theme-dark') ? 'dark' : 'light';
            frame.contentWindow.postMessage({ type: 'studio-theme', theme }, '*');
            frame.contentWindow.postMessage({ type: 'studio-lang', lang: state?.lang || 'zh' }, '*');
        }

        const state = {
            lang: 'zh',
            projects: [],
            series: [],
        };

        const grid = document.getElementById('grid');
        const emptyState = document.getElementById('emptyState');
        const itemCount = document.getElementById('itemCount');
        const newButton = document.getElementById('newButton');
        const newDropdown = document.getElementById('newDropdown');
        const seriesModal = document.getElementById('seriesModal');
        const projectModal = document.getElementById('projectModal');
        const seriesForm = document.getElementById('seriesForm');
        const projectForm = document.getElementById('projectForm');

        function tr(zh, en) {
            return state.lang === 'en' ? (en || zh) : zh;
        }

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, function(char) {
                return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[char];
            });
        }

        function statusLabel(status) {
            const map = {
                pending: tr('待处理', 'Pending'),
                processing: tr('处理中', 'Processing'),
                completed: tr('已完成', 'Completed')
            };
            return map[status] || status || tr('未知', 'Unknown');
        }

        function formatDate(ts) {
            if (!ts) return '';
            const locale = state.lang === 'en' ? 'en-US' : 'zh-CN';
            return new Date(ts * 1000).toLocaleDateString(locale, {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        function mixedItems() {
            return [
                ...state.series.map(item => ({ ...item, kind: 'series' })),
                ...state.projects.map(item => ({ ...item, kind: 'project' }))
            ].sort((a, b) => (b.created_at || 0) - (a.created_at || 0));
        }

        function renderSeriesCard(item) {
            const episodes = Array.isArray(item.episode_ids) ? item.episode_ids.length : 0;
            const characters = Array.isArray(item.characters) ? item.characters.length : 0;
            const scenes = Array.isArray(item.scenes) ? item.scenes.length : 0;
            return `
                <article class="card series-card" data-kind="series" data-id="${item.id}">
                    <button class="delete-btn" type="button" data-delete-kind="series" data-id="${item.id}" aria-label="${tr('删除系列', 'Delete series')}">×</button>
                    <div class="card-head">
                        <span class="tag">${tr('系列', 'Series')}</span>
                    </div>
                    <h3 class="card-title">${escapeHtml(item.title)}</h3>
                    <p class="series-desc">${escapeHtml(item.description || tr('暂无描述', 'No description'))}</p>
                    <div class="card-foot">
                        <span class="meta">${episodes}${tr('集', ' eps')}·${characters}${tr('角色', ' chars')}·${scenes}${tr('场景', ' scenes')}</span>
                        <span class="date">${formatDate(item.created_at)}</span>
                    </div>
                </article>
            `;
        }

        function renderProjectCard(item) {
            const characters = Array.isArray(item.characters) ? item.characters.length : 0;
            const scenes = Array.isArray(item.scenes) ? item.scenes.length : 0;
            const frames = Array.isArray(item.frames) ? item.frames.length : 0;
            const status = item.status || 'pending';
            return `
                <article class="card project-card" data-kind="project" data-id="${item.id}">
                    <button class="delete-btn" type="button" data-delete-kind="project" data-id="${item.id}" aria-label="${tr('删除项目', 'Delete project')}">×</button>
                    <div class="card-head">
                        <span class="status-badge status-${escapeHtml(status)}">${statusLabel(status)}</span>
                    </div>
                    <h3 class="card-title">${escapeHtml(item.title)}</h3>
                    <div class="card-foot">
                        <span class="meta">${characters}${tr('角色', ' chars')}·${scenes}${tr('场景', ' scenes')}·${frames}${tr('分镜', ' frames')}</span>
                        <span class="date">${formatDate(item.created_at)}</span>
                    </div>
                </article>
            `;
        }

        function render() {
            const items = mixedItems();
            itemCount.textContent = String(items.length);
            if (!items.length) {
                grid.innerHTML = '';
                emptyState.classList.add('show');
                return;
            }
            emptyState.classList.remove('show');
            grid.innerHTML = items.map(item => item.kind === 'series' ? renderSeriesCard(item) : renderProjectCard(item)).join('');
        }

        async function loadWorkspace() {
            try {
                const [projectsRes, seriesRes] = await Promise.all([
                    fetch('/api/comic/projects'),
                    fetch('/api/comic/series')
                ]);
                if (!projectsRes.ok || !seriesRes.ok) throw new Error('加载失败');
                state.projects = await projectsRes.json();
                state.series = await seriesRes.json();
            } catch (err) {
                console.error('loadWorkspace error:', err);
                state.projects = state.projects || [];
                state.series = state.series || [];
            }
            render();
        }

        async function createSeries(payload) {
            const res = await fetch('/api/comic/series', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!res.ok) { alert(tr('创建失败', 'Create failed')); return; }
            closeModal('seriesModal');
            seriesForm.reset();
            await loadWorkspace();
        }

        async function createProject(payload) {
            const res = await fetch('/api/comic/projects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!res.ok) { alert(tr('创建失败', 'Create failed')); return; }
            closeModal('projectModal');
            projectForm.reset();
            await loadWorkspace();
        }

        async function handleDelete(kind, id) {
            const ok = window.confirm(kind === 'series' ? tr('确认删除这个系列？', 'Delete this series?') : tr('确认删除这个项目？', 'Delete this project?'));
            if (!ok) return;
            const path = kind === 'series' ? `/api/comic/series/${id}` : `/api/comic/projects/${id}`;
            const res = await fetch(path, { method: 'DELETE' });
            if (!res.ok) { alert(tr('删除失败', 'Delete failed')); return; }
            await loadWorkspace();
        }

        function openModal(id) {
            closeDropdown();
            const modal = document.getElementById(id);
            modal.classList.add('show');
            const input = modal.querySelector('input, textarea');
            if (input) setTimeout(() => input.focus(), 20);
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function openDropdown() {
            newDropdown.classList.add('open');
            newButton.setAttribute('aria-expanded', 'true');
        }

        function closeDropdown() {
            newDropdown.classList.remove('open');
            newButton.setAttribute('aria-expanded', 'false');
        }

        function applyLanguage(lang) {
            state.lang = lang === 'en' ? 'en' : 'zh';
            document.documentElement.lang = state.lang === 'en' ? 'en' : 'zh-CN';
            document.title = tr('导演工坊', 'Director Workshop');
            document.querySelectorAll('[data-zh][data-en]').forEach(el => {
                el.textContent = tr(el.dataset.zh, el.dataset.en);
            });
            document.querySelectorAll('[data-placeholder-zh][data-placeholder-en]').forEach(el => {
                el.setAttribute('placeholder', tr(el.dataset.placeholderZh, el.dataset.placeholderEn));
            });
            render();
        }

        function navigate(kind, id) {
            window.parent.postMessage({
                type: 'navigate',
                page: kind === 'series' ? 'series' : 'project',
                id
            }, '*');
        }

        newButton.addEventListener('click', () => {
            if (newDropdown.classList.contains('open')) closeDropdown();
            else openDropdown();
        });
        document.getElementById('createSeriesAction').addEventListener('click', () => openModal('seriesModal'));
        document.getElementById('createProjectAction').addEventListener('click', () => openModal('projectModal'));
        document.getElementById('emptySeriesBtn').addEventListener('click', () => openModal('seriesModal'));
        document.getElementById('emptyProjectBtn').addEventListener('click', () => openModal('projectModal'));

        seriesForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const title = seriesForm.title.value.trim();
            if (!title) return;
            await createSeries({
                title,
                description: seriesForm.description.value.trim()
            });
        });

        projectForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const title = projectForm.title.value.trim();
            if (!title) return;
            await createProject({ title });
        });

        grid.addEventListener('click', async (event) => {
            const deleteButton = event.target.closest('[data-delete-kind]');
            if (deleteButton) {
                event.stopPropagation();
                await handleDelete(deleteButton.dataset.deleteKind, deleteButton.dataset.id);
                return;
            }
            const card = event.target.closest('.card');
            if (!card) return;
            navigate(card.dataset.kind, card.dataset.id);
        });

        document.addEventListener('click', (event) => {
            if (!event.target.closest('.actions')) closeDropdown();
        });

        document.querySelectorAll('[data-close]').forEach(button => {
            button.addEventListener('click', () => closeModal(button.dataset.close));
        });

        document.querySelectorAll('.modal-layer').forEach(layer => {
            layer.addEventListener('click', (event) => {
                if (event.target === layer) layer.classList.remove('show');
            });
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeDropdown();
                closeModal('seriesModal');
                closeModal('projectModal');
                return;
            }
            if (event.key === 'Enter') {
                const activeModal = document.querySelector('.modal-layer.show');
                if (!activeModal) return;
                const target = event.target;
                if (target.tagName === 'TEXTAREA' && !event.metaKey && !event.ctrlKey) return;
                const form = activeModal.querySelector('form');
                if (form) {
                    event.preventDefault();
                    form.requestSubmit();
                }
            }
        });

        window.addEventListener('message', event => {
            if (event.data?.type === 'studio-theme') {
                document.body.classList.toggle('theme-dark', event.data.theme === 'dark');
                syncLibraryFrame();
            }
            if (event.data?.type === 'studio-lang') {
                applyLanguage(event.data.lang);
                syncLibraryFrame();
            }
        });

        window.addEventListener('studio-lang-change', () => {
            const lang = window.StudioI18n ? window.StudioI18n.lang() : state.lang;
            applyLanguage(lang);
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const initialLang = window.StudioI18n ? window.StudioI18n.lang() : 'zh';
            applyLanguage(initialLang);
            document.body.classList.toggle('theme-dark', (window.StudioTheme ? window.StudioTheme.get() : 'light') === 'dark');
            await loadWorkspace();
        });
    </script>
</body>
</html>
